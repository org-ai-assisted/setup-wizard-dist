## AI-Assisted

## Per-repo parameters for developer-meta-files consumer workflows, read at
## workflow runtime. python3-pyqt5 for the offscreen PyQt5 wizard tests;
## helper-scripts is checked out and put on PYTHONPATH because the wizard
## imports guimessages from it. The headless render test drives the wizard on
## real, headless backends: xvfb + xauth + the Qt xcb runtime libraries for X11,
## and weston + qtwayland5 for Wayland. These tests do not skip, so the tools
## must be present.
dist-ai-tests:
  apt-packages: "python3 python3-pytest python3-hypothesis python3-pyqt5 python3-yaml xvfb xauth libxcb-xinerama0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxkbcommon-x11-0 libxcb-cursor0 weston qtwayland5"
  helper-scripts: true
